<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Chá de Cozinha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
  <div id="app">

    <!-- ── Hero ──────────────────────────────────────────────── -->
    <header class="hero">
      <div class="hero-tag">Você está convidado(a)</div>
      <h1 class="hero-title" id="event-title">Chá de Cozinha</h1>
      <p class="hero-host" id="event-host"></p>

      <div class="hero-details">
        <div class="hero-detail">
          <span class="hero-detail-label">Data</span>
          <span class="hero-detail-value" id="event-date"></span>
        </div>
        <span class="hero-detail-sep">·</span>
        <div class="hero-detail">
          <span class="hero-detail-label">Local</span>
          <span class="hero-detail-value" id="event-location"></span>
        </div>
      </div>

      <p class="hero-message" id="event-message"></p>
    </header>

    <!-- ── Form Card ─────────────────────────────────────────── -->
    <main class="form-card" id="form-section">

      <div class="gift-counter" id="gift-counter" style="display:none">
        <span id="gift-count">0</span> presentes disponíveis
      </div>

      <form id="confirmation-form" novalidate>

        <div class="field">
          <label class="field-label" for="nome">Nome completo</label>
          <input class="field-input" type="text" id="nome" name="nome"
            placeholder="Seu nome" autocomplete="name">
          <span class="field-error" id="error-nome"></span>
        </div>

        <div class="field">
          <label class="field-label" for="telefone">WhatsApp</label>
          <input class="field-input" type="tel" id="telefone" name="telefone"
            placeholder="(00) 00000-0000" autocomplete="tel" inputmode="numeric">
          <span class="field-error" id="error-telefone"></span>
        </div>

        <div class="field">
          <label class="field-label">Você vai comparecer?</label>
          <div class="toggle-group">
            <button type="button" class="toggle-btn" id="btn-sim" data-value="sim">
              Sim, estarei lá!
            </button>
            <button type="button" class="toggle-btn" id="btn-nao" data-value="nao">
              Não poderei ir
            </button>
          </div>
          <span class="field-error" id="error-presenca"></span>
        </div>

        <div class="field" id="gift-field" style="display:none">
          <label class="field-label" for="presente">Escolha um presente</label>
          <input type="hidden" id="presente-hidden" name="presente">
          <div class="custom-select" id="presente-dropdown">
            <button type="button" class="custom-select__trigger" id="presente" aria-haspopup="listbox" aria-expanded="false">
              <span class="custom-select__text placeholder" id="presente-text">Selecione um presente...</span>
              <svg class="custom-select__chevron" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
            <ul class="custom-select__list" id="presente-list" role="listbox"></ul>
          </div>
          <span class="field-error" id="error-presente"></span>
        </div>

        <div class="field" id="contribution-field" style="display:none">
          <label class="field-label">Como você gostaria de contribuir?</label>
          <div class="contribution-group">
            <button type="button" class="toggle-btn" id="btn-contrib-present" data-value="present">
              Escolher presente
            </button>
            <button type="button" class="toggle-btn" id="btn-contrib-pix" data-value="pix">
              Contribuir via PIX
            </button>
            <button type="button" class="toggle-btn" id="btn-contrib-none" data-value="none">
              Deixar para depois
            </button>
          </div>
          <span class="field-error" id="error-contribution"></span>
        </div>

        <div class="field" id="pix-field" style="display:none">
          <div class="pix-card">
            <div class="pix-card-title">Contribuição via PIX</div>
            <img class="pix-qrcode" id="pix-qrcode" alt="QR Code PIX">
            <div class="pix-key-label">Chave PIX</div>
            <div class="pix-key-wrapper">
              <span class="pix-key" id="pix-key">-</span>
              <button type="button" class="pix-copy-btn" id="pix-copy-btn">Copiar</button>
            </div>
            <a class="pix-mobile-link" id="pix-mobile-link" href="#" target="_blank" rel="noopener noreferrer">
              Abrir link PIX no celular
            </a>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          <span id="submit-text">Confirmar presença</span>
          <span id="submit-spinner" class="spinner" style="display:none"></span>
        </button>

        <div class="error-banner" id="error-banner"></div>

      </form>
    </main>

    <!-- ── Success ───────────────────────────────────────────── -->
    <div class="success-card" id="success-section" style="display:none">
      <div class="success-icon" id="success-icon">✓</div>
      <h2 class="success-title">Confirmação recebida!</h2>
      <p class="success-message" id="success-message"></p>
      <div class="success-details" id="success-details">
        <div class="success-detail-row">
          <span class="success-detail-label">Nome</span>
          <span class="success-detail-value" id="success-nome"></span>
        </div>
        <div class="success-detail-row" id="success-gift-row">
          <span class="success-detail-label">Presente</span>
          <span class="success-detail-value" id="success-presente"></span>
        </div>
        <div class="success-detail-row" id="success-contribution-row" style="display:none">
          <span class="success-detail-label">Contribuição</span>
          <span class="success-detail-value" id="success-contribution"></span>
        </div>
      </div>
    </div>

    <footer class="footer">Feito com carinho para este momento especial</footer>

  </div><!-- /#app -->

  <script src="src/scripts/api.js"></script>
  <script src="src/scripts/validation.js"></script>
  <script src="src/scripts/app.js"></script>
</body>
</html>
